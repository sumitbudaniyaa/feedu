<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF6EC" />

    <!-- Primary SEO -->
    <title>Feedu — Restaurant Management Software & QR Ordering System</title>
    <meta
      name="description"
      content="Feedu is an all-in-one restaurant management platform — QR ordering, kitchen display, staff, payments, loyalty and multi-branch analytics in one real-time system. Built for cafés, fine dining, bars and chains."
    />
    <meta
      name="keywords"
      content="restaurant management software, restaurant management system, restaurant POS, QR ordering system, restaurant SaaS, kitchen display system, restaurant operating system, multi-branch restaurant software, QR menu ordering, restaurant analytics"
    />
    <meta name="author" content="TwentyEleven" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://feedu.in/" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/feedu_logo.png" />
    <link rel="apple-touch-icon" href="/feedu_logo.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Feedu" />
    <meta property="og:title" content="Feedu — Restaurant Management Software & QR Ordering System" />
    <meta
      property="og:description"
      content="Run orders, kitchen, staff, payments, loyalty and multi-branch analytics from one real-time platform. One scan does the rest."
    />
    <meta property="og:url" content="https://feedu.in/" />
    <meta property="og:image" content="https://feedu.in/feedu_logo.png" />
    <meta property="og:image:width" content="2000" />
    <meta property="og:image:height" content="2000" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Feedu — Restaurant Management Software & QR Ordering System" />
    <meta
      name="twitter:description"
      content="The all-in-one restaurant operating system: QR ordering, kitchen display, staff, payments, loyalty and multi-branch analytics — live, in real time."
    />
    <meta name="twitter:image" content="https://feedu.in/feedu_logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Poppins:wght@400;500;600;700;800&display=swap"
    />

    <!-- Structured data: the product as a SaaS application -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Feedu",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Restaurant Management Software",
        "operatingSystem": "Web, iOS, Android",
        "url": "https://feedu.in/",
        "description": "Feedu is an all-in-one restaurant management platform — QR ordering, kitchen display, staff, payments, loyalty and multi-branch analytics in one real-time system.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "publisher": {
          "@type": "Organization",
          "name": "TwentyEleven",
          "url": "https://twentyeleven.in"
        }
      }
    </script>

    <!-- Structured data: the brand/organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Feedu",
        "url": "https://feedu.in/",
        "logo": "https://feedu.in/feedu_logo.png",
        "description": "The operating system for modern restaurants.",
        "parentOrganization": {
          "@type": "Organization",
          "name": "TwentyEleven",
          "url": "https://twentyeleven.in"
        },
        "sameAs": ["https://www.instagram.com/orderwithfeedu/"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
